<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Strict CSP: this app has no backend and ships no secrets. All persistence is
      localStorage; the only outbound calls are directly to the Anthropic API (OCR,
      using a key you provide) and lichess.org (export). No third-party scripts,
      analytics, or trackers are loaded.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://api.anthropic.com https://lichess.org; base-uri 'none'; form-action 'none'; object-src 'none'"
    />
    <title>Chess Scanner</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
